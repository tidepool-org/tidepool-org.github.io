<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% if page.title %} {{ page.title }} | {% endif %} Tidepool Project </title>
  <link rel="shortcut icon" type="image/png" href="/favicon.png">
  <link href='//fonts.googleapis.com/css?family=Open+Sans:400italic,700italic,400,700' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="/css/site.css">
</head>
<body class="page page-template-default">
  <div id="wrapper" class="hfeed"><a id="top"></a>
    <header id="header">
      <div id="header-inner" class="clearfix global-width">
        <div id="branding">
          <h1 id="blog-title"><a href="http://tidepool.org/" title="Tidepool" rel="home">Tidepool</a></h1>
        </div>
        <div id="access" class="clearfix">
        </div>
      </div>
    </header>
    <div id="main" role="main">
      <div id="page-background-container"><img src="images/illustration_02.svg" alt="background image"></div>
      <div id="main-inner" class="clearfix global-width">
        <div id="container">
          <div id="content" class="clearfix">
            <div class="post page type-page hentry clearfix">
              <div class="entry-content">
                <div class="full-width">
                  {{ content }}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
